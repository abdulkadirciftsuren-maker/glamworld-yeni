<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- Hafif önbellek: revalidate eder (yeni sürüm gelir) ama "no-store" YOK.
         Böylece sayfa arka plandan/geri gelince YENİDEN YÜKLENMEZ (bfcache çalışır).
         Sürüm tazeliği zaten hash'li dosya isimleriyle sağlanıyor. -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta name="description" content="GLAMWORLD - dünyanın en lüks meslek platformu" />
    <title>GLAMWORLD</title>
    <style>
      /* Sayfa parmakla zoomlanmaz, fotograflar serbest */
      html, body { touch-action: pan-x pan-y; }
      img { touch-action: auto; }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript gerekli.</noscript>
    <div id="root"></div>
  </body>
</html>
