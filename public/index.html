<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- Hafif önbellek: revalidate eder (yeni sürüm gelir) ama "no-store" YOK.
         Böylece sayfa arka plandan/geri gelince YENİDEN YÜKLENMEZ (bfcache çalışır).
         Sürüm tazeliği zaten hash'li dosya isimleriyle sağlanıyor. -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="GROXORG - dünyanın en lüks meslek platformu" />
    <!-- SADECE amblem düzenleyicinin yazı tipleri yüklenir. DİKKAT: Cinzel/Cormorant YÜKLENMEZ —
         site rakamları (sayaç, şerit, çipler) Cinzel kullanıyor; Cinzel yüklenince rakamlar eğri/bozuk
         çıkıyordu (B231 hatası). Yüklenmeyince eski DÜZGÜN serif yedeğine döner. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Montserrat:wght@600;800&family=Oswald:wght@500;700&family=Bebas+Neue&family=Anton&family=Lobster&family=Pacifico&family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Righteous&display=swap" rel="stylesheet" />
    <title>GROXORG</title>
    <style>
      /* Sayfa parmakla zoomlanmaz, fotograflar serbest */
      html, body, #root { touch-action: pan-x pan-y; background:#f5efe2; }
      img { touch-action: auto; }
      /* SOSYAL GİRİŞ YÜKLEME EKRANI — index.html'de (React'ten ÖNCE de görünür).
         Google/sosyal girişte sayfa bir an yeniden yüklenince BEYAZ flash olmasın diye,
         baştan sona TEK koyu ekran kalır. SADECE sosyal giriş bayrağı varsa gösterilir. */
      #gw-yuk{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;
        background:radial-gradient(ellipse at 50% 35%,#1a1206 0%,#0a0a0f 72%);}
      #gw-yuk .gw-k{display:flex;flex-direction:column;align-items:center;gap:22px;}
      #gw-yuk .gw-h{width:54px;height:54px;border-radius:50%;
        border:3px solid rgba(255,215,0,.18);border-top-color:#FFD700;border-right-color:#FFE9A8;
        filter:drop-shadow(0 0 10px rgba(255,215,0,.35));animation:gwDon .8s linear infinite;}
      @keyframes gwDon{to{transform:rotate(360deg);}}
      #gw-yuk .gw-m{font-family:Georgia,'Times New Roman',serif;color:#FFD700;font-size:17px;font-weight:700;
        letter-spacing:.04em;text-align:center;max-width:80vw;text-shadow:0 1px 8px rgba(255,215,0,.4);
        animation:gwNabiz 1.4s ease-in-out infinite;}
      @keyframes gwNabiz{0%,100%{opacity:.7;}50%{opacity:1;}}
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript gerekli.</noscript>
    <!-- Sosyal giriş yükleme ekranı (varsayılan gizli) -->
    <div id="gw-yuk"><div class="gw-k"><div class="gw-h"></div><div class="gw-m" id="gw-yuk-m"></div></div></div>
    <div id="root"></div>
    <script>
      /* Sosyal giriş sürerken (bayrak varsa) yükleme ekranını HEMEN göster —
         sayfa yeniden yüklense bile beyaz flash görünmez. React hazır olunca gizler. */
      try {
        var gwMsg = sessionStorage.getItem('gwYukMetin');
        if (gwMsg) {
          var gwM = document.getElementById('gw-yuk-m');
          if (gwM) gwM.textContent = gwMsg;
          document.getElementById('gw-yuk').style.display = 'flex';
        }
      } catch (e) {}
    </script>
  </body>
</html>
